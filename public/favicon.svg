<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark desert ground -->
  <rect width="32" height="32" rx="7" fill="#1F1711"/>
  <!-- Topographic contour rings — amber + spectral echo -->
  <ellipse cx="16" cy="16" rx="13.5" ry="10.5" fill="none" stroke="#C86B1D" stroke-width="1.4"/>
  <ellipse cx="16" cy="16" rx="10"   ry="7.5"  fill="none" stroke="#D9923B" stroke-width="1.2"/>
  <ellipse cx="16" cy="16" rx="6.5"  ry="4.5"  fill="none" stroke="#E7B15F" stroke-width="1.1"/>
  <ellipse cx="16" cy="16" rx="3"    ry="2"    fill="none" stroke="#dcceff" stroke-width="1" opacity="0.7"/>
  <!-- Centre point -->
  <circle  cx="16" cy="16" r="1.2" fill="#C86B1D"/>
</svg>
